version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"

    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "UTC"

    open-pull-requests-limit: 10
    rebase-strategy: "auto"

    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

    labels:
      - "dependencies"
      - "npm"

    commit-message:
      prefix: "chore(deps)"

    groups:
      security-fixes:
        patterns: ["*"]
        update-types: ["security"]

      dev-dependencies:
        dependency-type: "development"

      nextjs:
        patterns:
          - "next"
          - "@next/*"

      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

      linting:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier"

      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"

      build-tooling:
        patterns:
          - "typescript"
          - "ts-node"
          - "tslib"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"

    labels:
      - "dependencies"
      - "ci"

    commit-message:
      prefix: "chore(deps)"

    groups:
      github-actions:
        patterns: ["*"]
