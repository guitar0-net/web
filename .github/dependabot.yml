version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5
    rebase-strategy: "auto"

    labels:
      - "dependencies"
      - "npm"

    commit-message:
      prefix: "chore(deps)"

    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

      dev-dependencies:
        dependency-type: "development"

      nextjs:
        patterns:
          - "next"
          - "@next/*"

      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

      linting:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier"

      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"

      build-tooling:
        patterns:
          - "typescript"
          - "ts-node"
          - "tslib"

  - package-ecosystem: "docker"
    directory: "/infrastructure/docker"
    target-branch: "main"
    schedule:
      interval: "weekly"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"

    labels:
      - "dependencies"
      - "ci"

    commit-message:
      prefix: "chore(deps)"

    groups:
      github-actions:
        patterns: ["*"]
