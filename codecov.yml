codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes
    after_n_builds: 1

ignore:
  - "src/app/*.ts"
  - "src/app/**/page.tsx"
  - "src/app/**/layout.tsx"
  - "src/app/**/loading.tsx"
  - "src/app/**/error.tsx"
  - "src/app/**/not-found.tsx"
  - "src/app/api/**"
  - "src/features/**/api.ts"
  - "src/**/*-skeleton.tsx"
  - "src/lib/analytics/**"

coverage:
  precision: 2
  round: down
  status:
    project:
      default:
        target: 90%
        threshold: 10%
        base: auto
        branches:
          - main
        if_ci_failed: error
    patch:
      default:
        target: 90%
        threshold: 10%
    changes: off

comment: off
